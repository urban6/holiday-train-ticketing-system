<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인 · 명절열차</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="auth-body">

<main class="auth-page">

    <div class="auth-head">
        <div th:replace="~{fragments/brand :: logo(null)}"></div>
        <a class="auth-back" href="/">메인화면으로</a>
    </div>

    <div class="auth-box">

        <!--
          이 화면에 도달했다는 것 자체가 pass 쿠키 검증(AdmissionGuard)을 통과했다는 뜻이다.
          POST도 같은 게이트를 거친다 — GET에만 걸면 폼을 직접 쏘는 것으로 우회된다.
        -->
        <form class="auth-form" method="post" th:action="@{/login}">

            <!--
              오류 문구는 격자 밖에 둔다. 안에 넣으면 뜰 때마다 줄이 하나 늘어
              두 줄에 걸친 로그인 버튼의 자리가 밀린다.
            -->
            <p class="form-error" role="alert" th:if="${error}" th:text="${error}"></p>

            <div class="auth-fields">

                <label class="auth-label" for="loginId">아이디</label>
                <input class="auth-input" type="text" id="loginId" name="loginId"
                       th:value="${loginId}"
                       autocomplete="username" required autofocus>

                <!-- 두 줄에 걸치는 버튼이다. 자리는 CSS(grid-row)가 잡는다. -->
                <button type="submit" class="auth-submit">로그인</button>

                <label class="auth-label" for="password">비밀번호</label>
                <!-- 실패해도 값을 되돌려 놓지 않는다. 브라우저 기록·캐시에 남을 이유를 만들지 않는다. -->
                <input class="auth-input" type="password" id="password" name="password"
                       autocomplete="current-password" required>

            </div>

            <!-- 아이디 기억하기. 서버가 아니라 브라우저 localStorage에 저장한다(login.js). -->
            <label class="auth-remember">
                <input type="checkbox" id="rememberId"> 아이디 기억하기
            </label>

        </form>

        <hr class="auth-divider">

        <ul class="auth-notes">
            <li>시연용 계정 <b>test01 / qwer1234!</b> 로 로그인할 수 있습니다. 회원가입은 아직 구현하지 않았습니다.</li>
            <li>새로고침(F5), 즐겨찾기, 주소입력 등으로 로그인 화면에 접속할 수 없습니다.</li>
        </ul>

    </div>

    <p class="auth-copy">Copyright ⓒ 명절열차 All Rights reserved.</p>

    <p class="auth-note">
        대규모 트래픽과 동시성 제어를 연습하기 위한 <strong>학습용 프로젝트</strong>입니다.
        실제 승차권을 판매하지 않으며, 어떤 실제 기관과도 관련이 없습니다.
    </p>

</main>

<script th:src="@{/js/login.js}" defer></script>

</body>
</html>
