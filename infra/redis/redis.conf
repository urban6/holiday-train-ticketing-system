# Redis 설정 — 명절 예매 시스템 로컬 실험 환경
#
# 용도: 대기열(Sorted Set 기반 유입 제어) + 분산 락(좌석 선점)
# 두 용도의 요구가 다를 때는 더 엄격한 쪽(대기열)에 맞춘다.

# --- 네트워크 ---
# 컨테이너 네트워크 내부에서만 접근하는 로컬 실험 환경 전제.
# 외부에 노출되는 환경에서는 절대 이 설정을 그대로 쓰지 말 것.
bind 0.0.0.0
protected-mode no
port 6379

# --- 메모리 ---
# 컨테이너 mem_limit(512m)보다 낮게 잡는다.
# Redis가 자기 한도에 먼저 걸려야 컨테이너 OOM Kill 대신
# 애플리케이션이 관측할 수 있는 에러로 드러난다.
maxmemory 256mb

# 대기열 데이터는 evict되면 안 된다.
# allkeys-lru였다면 대기 순번이 조용히 사라져 대기열 자체가 망가진다.
# noeviction은 메모리가 차면 쓰기를 거부하는데, 그 실패는 눈에 보이므로
# 오히려 다뤄볼 가치가 있는 시나리오다.
maxmemory-policy noeviction

# --- 영속성 ---
# 분산 락만 쓴다면 영속성은 불필요하지만, 대기 순번은 재시작으로 날아가면 안 된다.
# AOF on/off 자체가 성능 실험 대상이므로, 비교 측정할 때 이 값을 바꿔가며 본다.
appendonly yes
appendfsync everysec

# --- 로깅 ---
loglevel notice

# --- 미설정 (필요해지면 켠다) ---
# notify-keyspace-events Ex
#   대기열 항목의 TTL 만료를 이벤트로 받아야 할 때 활성화.
#   지금은 만료 감지 로직이 없어 켜두면 불필요한 부하만 생긴다.
